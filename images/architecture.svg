<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#aab2bd"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="620" fill="#0d1117"/>

  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#e6edf3">Least-privilege AI access to Azure: Claude Desktop + Azure MCP Server + app registration</text>

  <!-- ===== authoritative boundary (drawn first; arrows cross over it) ===== -->
  <line x1="617.5" y1="66"  x2="617.5" y2="228" stroke="#d29922" stroke-width="1.3" stroke-dasharray="6 5" opacity="0.85"/>
  <line x1="617.5" y1="262" x2="617.5" y2="384" stroke="#d29922" stroke-width="1.3" stroke-dasharray="6 5" opacity="0.85"/>
  <line x1="617.5" y1="404" x2="617.5" y2="536" stroke="#d29922" stroke-width="1.3" stroke-dasharray="6 5" opacity="0.85"/>
  <rect x="537.5" y="536" width="160" height="23" rx="11.5" fill="#0d1117" stroke="#d29922"/>
  <text x="617.5" y="551.5" text-anchor="middle" font-size="10" fill="#e3b341">authoritative boundary</text>

  <!-- ===== Anthropic zone ===== -->
  <rect x="25" y="60" width="230" height="470" rx="8" fill="#1c1710" stroke="#5a4b33"/>
  <text x="40" y="84" font-size="12" font-weight="bold" fill="#c9a86f">ANTHROPIC (REMOTE)</text>

  <rect x="45" y="110" width="190" height="126" rx="6" fill="#161b22" stroke="#8a744f"/>
  <text x="140" y="136" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Claude</text>
  <text x="140" y="156" text-anchor="middle" font-size="10.5" fill="#c9a86f">the model</text>
  <text x="140" y="180" text-anchor="middle" font-size="10" fill="#9da7b1">sees tool definitions,</text>
  <text x="140" y="195" text-anchor="middle" font-size="10" fill="#9da7b1">tool calls and tool results</text>
  <text x="140" y="214" text-anchor="middle" font-size="10" fill="#9da7b1">never sees the config,</text>
  <text x="140" y="229" text-anchor="middle" font-size="10" fill="#9da7b1">the env block or the secret</text>

  <!-- ===== Local zone ===== -->
  <rect x="290" y="60" width="310" height="470" rx="8" fill="#161616" stroke="#4d4d4d"/>
  <text x="305" y="84" font-size="12" font-weight="bold" fill="#a0a8b0">LOCAL MACHINE: ADVISORY CONTROLS</text>

  <rect x="320" y="110" width="250" height="126" rx="6" fill="#1c2128" stroke="#767d86"/>
  <text x="445" y="136" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Claude Desktop</text>
  <text x="445" y="156" text-anchor="middle" font-size="10.5" fill="#a0a8b0">MCP host: local, runs as your user</text>
  <text x="445" y="180" text-anchor="middle" font-size="10" fill="#9da7b1">tool approval required before execution</text>
  <text x="445" y="195" text-anchor="middle" font-size="10" fill="#9da7b1">write/delete tools disabled</text>
  <text x="445" y="210" text-anchor="middle" font-size="10" fill="#9da7b1">reads config, holds the secret at rest</text>
  <text x="445" y="225" text-anchor="middle" font-size="10" fill="#9da7b1">spawns the server, injects the env block</text>

  <rect x="320" y="330" width="250" height="120" rx="6" fill="#1c2128" stroke="#767d86"/>
  <text x="445" y="356" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Azure MCP Server</text>
  <text x="445" y="376" text-anchor="middle" font-size="10.5" fill="#a0a8b0">child process: inherits the env block</text>
  <text x="445" y="399" text-anchor="middle" font-size="10" fill="#9da7b1">azmcp, launched with --read-only</text>
  <text x="445" y="414" text-anchor="middle" font-size="10" fill="#9da7b1">credential chain: EnvironmentCredential</text>
  <text x="445" y="429" text-anchor="middle" font-size="10" fill="#9da7b1">service principal credentials from env</text>

  <!-- ===== Azure zone ===== -->
  <rect x="635" y="60" width="305" height="470" rx="8" fill="#0f1a28" stroke="#2e4a68"/>
  <text x="650" y="84" font-size="12" font-weight="bold" fill="#6ea8dc">AZURE: SERVICE-SIDE ENFORCEMENT</text>

  <rect x="660" y="110" width="255" height="112" rx="6" fill="#161b22" stroke="#4e77a3"/>
  <text x="787" y="136" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Microsoft Entra ID</text>
  <text x="787" y="157" text-anchor="middle" font-size="10" fill="#9da7b1">authenticates claude-azure-reader (SP)</text>
  <text x="787" y="172" text-anchor="middle" font-size="10" fill="#9da7b1">client credentials flow</text>
  <text x="787" y="187" text-anchor="middle" font-size="10" fill="#9da7b1">issues OAuth 2.0 access token (JWT)</text>
  <text x="787" y="207" text-anchor="middle" font-size="10" fill="#8b949e">the token carries identity, not scope</text>

  <rect x="660" y="252" width="255" height="42" rx="6" fill="#161b22" stroke="#4e77a3" stroke-dasharray="4 3"/>
  <text x="787" y="278" text-anchor="middle" font-size="10" fill="#9da7b1">service principal sign-in logs (audit)</text>
  <line x1="787" y1="224" x2="787" y2="250" stroke="#aab2bd" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="660" y="330" width="255" height="150" rx="6" fill="#161b22" stroke="#4e77a3"/>
  <text x="787" y="356" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Azure Resource Manager</text>
  <text x="787" y="377" text-anchor="middle" font-size="10" fill="#9da7b1">RBAC evaluated on every request</text>
  <text x="787" y="392" text-anchor="middle" font-size="10" fill="#9da7b1">scope lives in the role assignment:</text>
  <text x="787" y="407" text-anchor="middle" font-size="10" fill="#9da7b1">Reader on one resource group</text>
  <text x="787" y="431" text-anchor="middle" font-size="10" fill="#56d364">reads inside the RG: allowed</text>
  <text x="787" y="448" text-anchor="middle" font-size="10" fill="#f47067">writes: AuthorizationFailed (403)</text>
  <text x="787" y="463" text-anchor="middle" font-size="10" fill="#f47067">outside the RG: filtered, invisible</text>

  <!-- ===== arrows ===== -->

  <text x="277" y="134" text-anchor="middle" font-size="10" fill="#8b949e">TLS</text>
  <line x1="238" y1="152" x2="317" y2="152" stroke="#aab2bd" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="277" y="147" text-anchor="middle" font-size="10" fill="#9da7b1">1. tool call</text>
  <line x1="317" y1="172" x2="238" y2="172" stroke="#aab2bd" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="277" y="187" text-anchor="middle" font-size="10" fill="#9da7b1">prompts +</text>
  <text x="277" y="199" text-anchor="middle" font-size="10" fill="#9da7b1">tool results</text>

  <line x1="445" y1="238" x2="445" y2="327" stroke="#aab2bd" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="445" y="272" text-anchor="middle" font-size="10" fill="#9da7b1">2. tool call over stdio</text>
  <text x="445" y="286" text-anchor="middle" font-size="10" fill="#8b949e">(server spawned as child process)</text>

  <line x1="570" y1="345" x2="657" y2="196" stroke="#aab2bd" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="611" y="238" text-anchor="end" font-size="10" fill="#9da7b1">3. client</text>
  <text x="611" y="250" text-anchor="end" font-size="10" fill="#9da7b1">credentials</text>

  <line x1="672" y1="226" x2="585" y2="332" stroke="#aab2bd" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="654" y="300" font-size="10" fill="#9da7b1">4. token</text>

  <line x1="570" y1="405" x2="657" y2="405" stroke="#aab2bd" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="613" y="396" text-anchor="middle" font-size="10" fill="#9da7b1">5. request + token</text>

  <!-- ===== captions ===== -->
  <text x="480" y="582" text-anchor="middle" font-size="12" fill="#c8d1d9">Local controls shape what is attempted; ARM decides what is permitted, evaluated per request on the service side.</text>
  <text x="480" y="603" text-anchor="middle" font-size="11" fill="#8b949e">Results travel back up the same path carrying data only. The model never talks to Azure; Azure never talks to Anthropic.</text>
</svg>
