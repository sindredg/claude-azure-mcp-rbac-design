<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#aab2bd"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="600" fill="#0d1117"/>

  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#e6edf3">Least-privilege AI access to Azure: Claude + Azure MCP Server</text>

  <!-- Anthropic zone -->
  <rect x="25" y="60" width="230" height="470" rx="8" fill="#1c1710" stroke="#5a4b33"/>
  <text x="40" y="84" font-size="12" font-weight="bold" fill="#c9a86f">ANTHROPIC</text>
  <rect x="45" y="110" width="190" height="90" rx="6" fill="#161b22" stroke="#8a744f"/>
  <text x="140" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Anthropic API</text>
  <text x="140" y="162" text-anchor="middle" font-size="11" fill="#9da7b1">model inference</text>
  <text x="140" y="178" text-anchor="middle" font-size="11" fill="#9da7b1">never talks to Azure</text>

  <!-- Local zone -->
  <rect x="290" y="60" width="310" height="470" rx="8" fill="#161616" stroke="#4d4d4d"/>
  <text x="305" y="84" font-size="12" font-weight="bold" fill="#a0a8b0">LOCAL MACHINE</text>

  <rect x="320" y="110" width="250" height="120" rx="6" fill="#1c2128" stroke="#767d86"/>
  <text x="445" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Claude Desktop (client)</text>
  <text x="445" y="157" text-anchor="middle" font-size="11" fill="#9da7b1">tool approval before execution</text>
  <text x="445" y="173" text-anchor="middle" font-size="11" fill="#9da7b1">write/delete tools disabled</text>
  <text x="445" y="189" text-anchor="middle" font-size="11" fill="#9da7b1">holds config incl. secret at rest</text>
  <text x="445" y="205" text-anchor="middle" font-size="11" fill="#9da7b1">spawns server, injects env block</text>

  <rect x="320" y="330" width="250" height="120" rx="6" fill="#1c2128" stroke="#767d86"/>
  <text x="445" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Azure MCP Server</text>
  <text x="445" y="377" text-anchor="middle" font-size="11" fill="#9da7b1">azmcp.exe, --read-only</text>
  <text x="445" y="393" text-anchor="middle" font-size="11" fill="#9da7b1">SP credentials from env</text>
  <text x="445" y="409" text-anchor="middle" font-size="11" fill="#9da7b1">credential chain:</text>
  <text x="445" y="425" text-anchor="middle" font-size="11" fill="#9da7b1">EnvironmentCredential</text>

  <!-- Azure zone -->
  <rect x="635" y="60" width="305" height="470" rx="8" fill="#0f1a28" stroke="#2e4a68"/>
  <text x="650" y="84" font-size="12" font-weight="bold" fill="#6ea8dc">AZURE (SERVICE SIDE)</text>

  <rect x="660" y="110" width="255" height="105" rx="6" fill="#161b22" stroke="#4e77a3"/>
  <text x="787" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Microsoft Entra ID</text>
  <text x="787" y="157" text-anchor="middle" font-size="11" fill="#9da7b1">authenticates claude-azure-reader SP</text>
  <text x="787" y="173" text-anchor="middle" font-size="11" fill="#9da7b1">issues OAuth 2.0 access token (JWT)</text>
  <text x="787" y="189" text-anchor="middle" font-size="11" fill="#9da7b1">client credentials flow</text>

  <rect x="660" y="245" width="255" height="42" rx="6" fill="#161b22" stroke="#4e77a3" stroke-dasharray="4 3"/>
  <text x="787" y="271" text-anchor="middle" font-size="11" fill="#9da7b1">service principal sign-in logs (audit)</text>
  <line x1="787" y1="215" x2="787" y2="243" stroke="#aab2bd" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="660" y="330" width="255" height="150" rx="6" fill="#161b22" stroke="#4e77a3"/>
  <text x="787" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#e6edf3">Azure Resource Manager</text>
  <text x="787" y="377" text-anchor="middle" font-size="11" fill="#9da7b1">RBAC evaluated on every request</text>
  <text x="787" y="393" text-anchor="middle" font-size="11" fill="#9da7b1">Reader scoped to one resource group</text>
  <text x="787" y="419" text-anchor="middle" font-size="11" fill="#56d364">reads inside RG: allowed</text>
  <text x="787" y="437" text-anchor="middle" font-size="11" fill="#f47067">writes: 403</text>
  <text x="787" y="453" text-anchor="middle" font-size="11" fill="#f47067">out-of-scope reads: 403 or filtered</text>

  <!-- Claude Desktop <-> Anthropic API -->
  <line x1="238" y1="150" x2="317" y2="150" stroke="#aab2bd" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="317" y1="165" x2="238" y2="165" stroke="#aab2bd" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="277" y="140" text-anchor="middle" font-size="10" fill="#9da7b1">TLS</text>
  <text x="277" y="185" text-anchor="middle" font-size="10" fill="#9da7b1">prompts,</text>
  <text x="277" y="197" text-anchor="middle" font-size="10" fill="#9da7b1">tool results</text>

  <!-- Claude Desktop -> MCP server -->
  <line x1="445" y1="230" x2="445" y2="327" stroke="#aab2bd" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="457" y="270" font-size="10" fill="#9da7b1">1. tool call</text>
  <text x="457" y="283" font-size="10" fill="#9da7b1">(stdio)</text>

  <!-- MCP server -> Entra (client credentials) -->
  <line x1="570" y1="345" x2="657" y2="185" stroke="#aab2bd" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="576" y="248" font-size="10" fill="#9da7b1">2. client</text>
  <text x="576" y="260" font-size="10" fill="#9da7b1">credentials</text>

  <!-- Entra -> MCP server (token, dashed) -->
  <line x1="672" y1="218" x2="585" y2="332" stroke="#aab2bd" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="655" y="290" font-size="10" fill="#9da7b1">3. token</text>

  <!-- MCP server -> ARM -->
  <line x1="570" y1="405" x2="657" y2="405" stroke="#aab2bd" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="613" y="395" text-anchor="middle" font-size="10" fill="#9da7b1">4. request</text>
  <text x="613" y="420" text-anchor="middle" font-size="10" fill="#9da7b1">+ token</text>

  <!-- Bottom caption -->
  <text x="480" y="560" text-anchor="middle" font-size="12" fill="#c8d1d9">Enforcement lives on the service side: RBAC is evaluated by ARM on every request, outside anything the client can change.</text>
  <text x="480" y="580" text-anchor="middle" font-size="11" fill="#8b949e">The model never talks to Azure, Azure never talks to Anthropic; credentials never leave the local machine.</text>
</svg>
