<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#444444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#2e7d32"/>
    </marker>
    <marker id="arrowRed" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#c62828"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>

  <text x="480" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#222222">Least-privilege AI access to Azure: Claude + Azure MCP Server</text>

  <!-- Anthropic zone -->
  <rect x="25" y="60" width="230" height="470" rx="8" fill="#faf6f0" stroke="#d8c9b4"/>
  <text x="40" y="84" font-size="12" font-weight="bold" fill="#8a7350">ANTHROPIC</text>
  <rect x="45" y="110" width="190" height="90" rx="6" fill="#ffffff" stroke="#c9b18f"/>
  <text x="140" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#222222">Anthropic API</text>
  <text x="140" y="162" text-anchor="middle" font-size="11" fill="#555555">model inference</text>
  <text x="140" y="178" text-anchor="middle" font-size="11" fill="#555555">never talks to Azure</text>

  <!-- Local zone -->
  <rect x="290" y="60" width="310" height="470" rx="8" fill="#f6f6f6" stroke="#cccccc"/>
  <text x="305" y="84" font-size="12" font-weight="bold" fill="#666666">LOCAL MACHINE</text>

  <rect x="320" y="110" width="250" height="120" rx="6" fill="#ffffff" stroke="#999999"/>
  <text x="445" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#222222">Claude Desktop (client)</text>
  <text x="445" y="157" text-anchor="middle" font-size="11" fill="#555555">tool approval before execution</text>
  <text x="445" y="173" text-anchor="middle" font-size="11" fill="#555555">write/delete tools disabled</text>
  <text x="445" y="189" text-anchor="middle" font-size="11" fill="#555555">holds config incl. secret at rest</text>
  <text x="445" y="205" text-anchor="middle" font-size="11" fill="#555555">spawns server, injects env block</text>

  <rect x="320" y="330" width="250" height="120" rx="6" fill="#ffffff" stroke="#999999"/>
  <text x="445" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#222222">Azure MCP Server</text>
  <text x="445" y="377" text-anchor="middle" font-size="11" fill="#555555">azmcp.exe, --read-only</text>
  <text x="445" y="393" text-anchor="middle" font-size="11" fill="#555555">SP credentials from env</text>
  <text x="445" y="409" text-anchor="middle" font-size="11" fill="#555555">credential chain:</text>
  <text x="445" y="425" text-anchor="middle" font-size="11" fill="#555555">EnvironmentCredential</text>

  <!-- Azure zone -->
  <rect x="635" y="60" width="305" height="470" rx="8" fill="#eef4fb" stroke="#b5cde6"/>
  <text x="650" y="84" font-size="12" font-weight="bold" fill="#3a6ea5">AZURE (SERVICE SIDE)</text>

  <rect x="660" y="110" width="255" height="105" rx="6" fill="#ffffff" stroke="#7da7d0"/>
  <text x="787" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#222222">Microsoft Entra ID</text>
  <text x="787" y="157" text-anchor="middle" font-size="11" fill="#555555">authenticates claude-azure-reader SP</text>
  <text x="787" y="173" text-anchor="middle" font-size="11" fill="#555555">issues OAuth 2.0 access token (JWT)</text>
  <text x="787" y="189" text-anchor="middle" font-size="11" fill="#555555">client credentials flow</text>

  <rect x="660" y="245" width="255" height="42" rx="6" fill="#ffffff" stroke="#7da7d0" stroke-dasharray="4 3"/>
  <text x="787" y="271" text-anchor="middle" font-size="11" fill="#555555">service principal sign-in logs (audit)</text>
  <line x1="787" y1="215" x2="787" y2="243" stroke="#444444" stroke-width="1.2" marker-end="url(#arrow)"/>

  <rect x="660" y="330" width="255" height="150" rx="6" fill="#ffffff" stroke="#7da7d0"/>
  <text x="787" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#222222">Azure Resource Manager</text>
  <text x="787" y="377" text-anchor="middle" font-size="11" fill="#555555">RBAC evaluated on every request</text>
  <text x="787" y="393" text-anchor="middle" font-size="11" fill="#555555">Reader scoped to one resource group</text>
  <text x="787" y="419" text-anchor="middle" font-size="11" fill="#2e7d32">reads inside RG: allowed</text>
  <text x="787" y="437" text-anchor="middle" font-size="11" fill="#c62828">writes: 403</text>
  <text x="787" y="453" text-anchor="middle" font-size="11" fill="#c62828">out-of-scope reads: 403 or filtered</text>

  <!-- Claude Desktop <-> Anthropic API -->
  <line x1="238" y1="150" x2="317" y2="150" stroke="#444444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="317" y1="165" x2="238" y2="165" stroke="#444444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="277" y="140" text-anchor="middle" font-size="10" fill="#555555">TLS</text>
  <text x="277" y="185" text-anchor="middle" font-size="10" fill="#555555">prompts,</text>
  <text x="277" y="197" text-anchor="middle" font-size="10" fill="#555555">tool results</text>

  <!-- Claude Desktop -> MCP server -->
  <line x1="445" y1="230" x2="445" y2="327" stroke="#444444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="457" y="270" font-size="10" fill="#555555">1. tool call</text>
  <text x="457" y="283" font-size="10" fill="#555555">(stdio)</text>

  <!-- MCP server -> Entra (client credentials) -->
  <line x1="570" y1="345" x2="657" y2="185" stroke="#444444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="576" y="248" font-size="10" fill="#555555">2. client</text>
  <text x="576" y="260" font-size="10" fill="#555555">credentials</text>

  <!-- Entra -> MCP server (token, dashed) -->
  <line x1="672" y1="218" x2="585" y2="332" stroke="#444444" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="655" y="290" font-size="10" fill="#555555">3. token</text>

  <!-- MCP server -> ARM -->
  <line x1="570" y1="405" x2="657" y2="405" stroke="#444444" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="613" y="395" text-anchor="middle" font-size="10" fill="#555555">4. request</text>
  <text x="613" y="420" text-anchor="middle" font-size="10" fill="#555555">+ token</text>

  <!-- Bottom caption -->
  <text x="480" y="560" text-anchor="middle" font-size="12" fill="#333333">Enforcement lives on the service side: RBAC is evaluated by ARM on every request, outside anything the client can change.</text>
  <text x="480" y="580" text-anchor="middle" font-size="11" fill="#777777">The model never talks to Azure, Azure never talks to Anthropic; credentials never leave the local machine.</text>
</svg>
